[[task]]
id = 7
phase = 2
bundle = "phxagents-adoption"
status = "done"
title = "Spike: evaluate phxagents' Iron-Laws + agent model-tiering patterns for our hooks (concept only)"
scores = { d = 3, b = 4, u = 7 }
acceptance_criteria = [
  "A written evaluation with an explicit Go/No-Go verdict for (a) the Iron-Laws catalog pattern and (b) agent model-tiering, each with rationale and rough cost",
  "For any Go verdict, a concrete follow-up task is proposed (title + one-line scope)",
  "No code changes and no new hooks land under this task",
]
out_of_scope = [
  "Implementing any Iron Law or tiering change (follow-up tasks only)",
  "Copying phxagents hook scripts verbatim",
]
body = """
phxagents leans on two patterns worth studying for zenhive's own hook-driven plugins: (1) "Iron Laws" — hard, hook-enforced domain rules that can halt compilation on violation (they ship 26, wired via 31 hooks), and (2) model-tiering of agents (opus orchestrators / sonnet domain experts / haiku lightweight).

zenhive already has a hook-enforcement muscle in `code-quality` (PreToolUse quality gate) and `dev-discipline` (pause-and-pick + tasks.toml integrity guards). The question this spike answers: which, if any, of the Iron-Laws packaging (a named catalog of hard rules with clear violation output + escape hatch) and the tiering idea are worth adopting into those plugins — and what would each cost.

Deliver a short written Go/No-Go per pattern with rationale, and, for any Go, a proposed follow-up task (do not implement here). Concept/evaluation only — no code, no new hooks in this task.
"""
implemented = """
Go/No-Go evaluation (research: 2 Explore agents over this repo + live GitHub fetch of oliver-kriska/claude-elixir-phoenix, 479 stars, MIT, pushed 2026-07-11).

phxagents Iron Laws: 26 named hard rules (LiveView/Ecto/Oban/security/OTP/style, e.g. "never use :float for money", "authorize every handle_event"), detected by a dedicated Sonnet-tier iron-law-judge agent (pattern-matching, read-only) wired into 31 hooks. Violation = hard block, no escape hatch.

phxagents model tiering: Opus (4 orchestrators) / Sonnet (~13 domain specialists) / Haiku (4 mechanical) — opus for high-stakes orchestration/security, sonnet for near-opus judgment cheaper, haiku for deterministic/compression work.

zenhive's current state: code-quality = 1 PreToolUse LLM-prompt hook enforcing 4 unnamed checks (A-D), hard deny. dev-discipline = 7 shell-script hooks (2 hard-deny: human-assignee, stale-model; 5 soft-warn). marketplace-hygiene adds 1 more hard-deny (skill-edit block). No named/numbered rule catalog exists anywhere — every hook is ad hoc. The only "named catalog" precedent is prose (critical-rules.md's addressable sections), not a machine-readable registry.

zenhive model-tiering state: ~/.claude/settings.json sets CLAUDE_CODE_SUBAGENT_MODEL=sonnet — a documented, deliberate blanket override (highest precedence) forcing every local subagent to Sonnet, with explicit rationale and an explicit reversal path. The only tiering artifact (haiku/sonnet templates in elixir-workflows:workflow-generator, for scaffolding consumer-project subagents) would itself be flattened under the standing override.

