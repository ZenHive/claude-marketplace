status = "pending"
title = "Retire the thin `phoenix` plugin (phxagents covers Phoenix/LiveView far deeper)"
scores = { d = 3, b = 4, u = 5 }
body = """
The in-repo `phoenix` plugin (`plugins/phoenix/`) ships only two skills — `phoenix-setup` (phx.gen.auth, Sobelow, LiveDebugger, `--live`) and `nexus-template` (a Nexus admin dashboard template). Against phxagents' Phoenix/LiveView coverage this is negligible and duplicative, so retire the plugin.

Before deleting: judge `nexus-template` on its own merits — it is an org/template-specific artifact that phxagents does NOT cover, so if it is still wanted, rescue it as a single skill in a more fitting plugin (e.g. an elixir/scaffolding home) rather than losing it with the plugin. `phoenix-setup` overlaps phxagents and can go.

Wind down consistently across every place the plugin is registered: `.claude-plugin/marketplace.json`, `plugins/phoenix/`, `scripts/skill-include-map.sh` (drop the mapped entries), `SKILLS.md` (catalog), and any prose/keyword references. Run `claude plugin validate --strict` and confirm no dangling `phoenix@zenhive` / `phoenix:<skill>` references remain.
"""
