[[task]]
id = 6
phase = 2
bundle = "phxagents-adoption"
status = "pending"
title = "Slim the `elixir` plugin core to what phxagents does NOT cover"
scores = { d = 3, b = 4, u = 6 }
body = """
The `elixir` plugin's core dev-tooling layer overlaps phxagents on runtime/domain concerns (LiveView/Ecto/OTP conventions, Iron-Law-style rules) where phxagents goes deeper. Produce an explicit keep/drop decision per skill and per hook, then deprecate the overlapping ones at the canonical include source (edit `~/.claude/includes/*.md`, then run `scripts/sync-skills-from-includes.sh` — do NOT hand-edit generated SKILL.md bodies; the marketplace-hygiene block hook enforces this).

KEEP (phxagents has no equivalent — these are zenhive-specific tooling, not domain rules):
  - the JSON tool-flows: `dialyzer-json`, `ex-unit-json`, and the `prefer-dialyzer-json` / `prefer-test-json` hooks
  - `elixir-ci-harness`, `tidewave-guide`
Everything else in the core layer is a DROP CANDIDATE — evaluate each against phxagents coverage before removing; this task is the analysis + the safe removals, not a blind purge.

Scope note: this covers only the `elixir` plugin's core dev-tooling skills+hooks. The 23 elixir-vibe ecosystem libs are a separate audit (deliberately not created), and `elixir-volt` / `elixir-workflows` are orthogonal to phxagents (Volt/WASM/npm, workflow generator) — leave them alone.
"""
acceptance_criteria = [
  "A written keep/drop table covering every core elixir skill + hook, each drop justified by 'covered deeper by phxagents'",
  "KEEP set preserved: dialyzer-json, ex-unit-json, prefer-*-json hooks, elixir-ci-harness, tidewave-guide",
  "Drops applied at the include source and re-synced via sync-skills-from-includes.sh (no hand-edited SKILL.md bodies); skill-include-map.sh + SKILLS.md consistent",
