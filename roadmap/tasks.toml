status = "pending"
title = "Document phxagents.dev as the recommended upstream Phoenix/Elixir runtime+domain layer (don't fork/vendor)"
scores = { d = 4, b = 5, u = 4 }
body = """
Position `oliver-kriska/claude-elixir-phoenix` (site phxagents.dev, MIT, plugin v2.14.1, ~478 stars, actively maintained) as a recommended external companion for repos that use the Elixir Phoenix web framework — NOT as something we fork or vendor. It is itself a native Claude Code plugin marketplace, self-gated on `mix.exs` presence, so it is safe to enable globally and installs via the standard `/plugin marketplace add oliver-kriska/claude-elixir-phoenix` + `/plugin install elixir-phoenix`.

The strategic finding from the phxagents analysis: it is a deep Phoenix vertical (26 agents, 51 skills, 31 hooks, 26 compile-halting "Iron Laws", Tidewave MCP runtime integration) and is strongest exactly where zenhive is thinnest — Phoenix runtime, LiveView, Ecto, Oban, OTP, Ash. It has nothing comparable to zenhive's orchestration layer. So the two compose: zenhive = "how we work/organize" (harness, workflow, tasks, review, delegation, discipline), phxagents = "Phoenix domain knowledge".

Add a short section to README.md (and a CHANGELOG note) that: names phxagents as an optional recommended add-on for Phoenix projects, gives the install line, and draws the who-does-what boundary so users understand it is complementary, not a competitor. Keep it to prose/links — no code copied, no submodule, no auto-install.
"""
