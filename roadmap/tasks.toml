  "plugins/phoenix removed (or reduced to only a rescued nexus-template) and de-registered from .claude-plugin/marketplace.json",
  "skill-include-map.sh and SKILLS.md updated; no dangling phoenix plugin/skill references anywhere",
  "claude plugin validate --strict passes",
  "Decision on nexus-template recorded (rescued into which plugin, or intentionally dropped)",
]
out_of_scope = [
  "The elixir-plugin core slimming (task 6)",
  "Recommending phxagents itself (task 4)",
  "The elixir-vibe ecosystem skills (not part of this task)",
]
