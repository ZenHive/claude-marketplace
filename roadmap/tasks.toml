[[task]]
id = 7
phase = 2
bundle = "phxagents-adoption"
status = "pending"
title = "Spike: evaluate phxagents' Iron-Laws + agent model-tiering patterns for our hooks (concept only)"
scores = { d = 3, b = 4, u = 7 }
body = """
phxagents leans on two patterns worth studying for zenhive's own hook-driven plugins: (1) "Iron Laws" — hard, hook-enforced domain rules that can halt compilation on violation (they ship 26, wired via 31 hooks), and (2) model-tiering of agents (opus orchestrators / sonnet domain experts / haiku lightweight).

zenhive already has a hook-enforcement muscle in `code-quality` (PreToolUse quality gate) and `dev-discipline` (pause-and-pick + tasks.toml integrity guards). The question this spike answers: which, if any, of the Iron-Laws packaging (a named catalog of hard rules with clear violation output + escape hatch) and the tiering idea are worth adopting into those plugins — and what would each cost.

Deliver a short written Go/No-Go per pattern with rationale, and, for any Go, a proposed follow-up task (do not implement here). Concept/evaluation only — no code, no new hooks in this task.
"""
acceptance_criteria = [
  "A written evaluation with an explicit Go/No-Go verdict for (a) the Iron-Laws catalog pattern and (b) agent model-tiering, each with rationale and rough cost",
  "For any Go verdict, a concrete follow-up task is proposed (title + one-line scope)",
  "No code changes and no new hooks land under this task",
]
out_of_scope = [
  "Implementing any Iron Law or tiering change (follow-up tasks only)",
